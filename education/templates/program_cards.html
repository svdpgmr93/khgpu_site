<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
  {% for program in programs %}
    <div class="col">
      <a href="{% url 'education:edu_program' program.id %}" class="card h-100 text-decoration-none outline-none border-0 bg-gray rounded-4 overflow-hidden edu-program-card-link">
        <img style="height: 220px; object-fit: cover;" src="{{ program.edu_card_img.url }}" class="card-img-top" alt="..." />
        <div class="card-body d-flex flex-column px-4 pb-4">
          <h5 class="card-title fw-bold">{{ program.name }}</h5>
          <p class="fs-6 pe-4">{{ program.edu_number }}</p>
        </div>
      </a>
    </div>
  {% endfor %}
</div>
